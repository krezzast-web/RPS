name: Build and Deploy Real-Time Multiplayer RPS to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: rps_db
          POSTGRES_USER: rps_user
          POSTGRES_PASSWORD: rps_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json
            backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend && npm install
          cd ../frontend && npm ci

      - name: Code Quality - Run Linters
        run: |
          cd backend && npm run lint
          cd ../frontend && npm run lint

      - name: Run Backend Integration Tests (Jest)
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: rps_user
          DB_PASSWORD: rps_password
          DB_NAME: rps_db
        run: |
          cd backend
          npm run test

      - name: Build Frontend Application
        run: |
          cd frontend
          npm run build

      - name: Deploy to EC2 via SSH
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile=/dev/null" > ~/.ssh/config

          # Prepare server directories
          ssh $USER@$HOST "mkdir -p ~/app/backend ~/app/frontend/dist"

          # Transfer backend files (not .env — that lives on server only)
          scp backend/package.json backend/package-lock.json \
              backend/server.js backend/db.js backend/server.test.js \
              $USER@$HOST:~/app/backend/

          # Transfer built frontend
          scp -r frontend/dist/* $USER@$HOST:~/app/frontend/dist/

          # Transfer nginx config and bootstrap script
          scp .github/nginx.conf $USER@$HOST:~/app/nginx.conf
          scp .github/bootstrap.sh $USER@$HOST:~/app/bootstrap.sh

          # Apply nginx config
          ssh $USER@$HOST "sudo mv ~/app/nginx.conf /etc/nginx/sites-available/default && sudo nginx -t && sudo systemctl restart nginx"

          # Run bootstrap: ensures PostgreSQL, .env, backend restart, and health check
          ssh $USER@$HOST "chmod +x ~/app/bootstrap.sh && ~/app/bootstrap.sh"
