name: Build and Deploy Original RPS Game Lobby to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm ci

      - name: Code Quality - Run Linter
        run: |
          npm run lint

      - name: Build React Application
        run: |
          npm run build

      - name: Deploy static assets to EC2 via SSH
        env:
          PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
        run: |
          # Create SSH directory and add key
          mkdir -p ~/.ssh
          echo "$PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # Build SSH configuration to ignore host key warnings
          echo -e "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile=/dev/null" > ~/.ssh/config

          # Prepare directories on the EC2 server
          ssh $USER@$HOST "mkdir -p ~/app/dist"

          # Transfer React build artifacts and Nginx configuration file
          scp -r dist/* $USER@$HOST:~/app/dist/
          scp .github/nginx.conf $USER@$HOST:~/app/nginx.conf

          # Apply Nginx configuration and restart service
          ssh $USER@$HOST "
            sudo mv ~/app/nginx.conf /etc/nginx/sites-available/default
            sudo systemctl restart nginx
          "
