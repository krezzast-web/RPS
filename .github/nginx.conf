server {
    listen 80;
    listen [::]:80;
    server_name rps.flappycat.fun;

    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name rps.flappycat.fun;

    # SSL Certificates (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/rps.flappycat.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/rps.flappycat.fun/privkey.pem;

    # Strong SSL Security Settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /home/ubuntu/app/frontend/dist;
    index index.html;

    # React Client Router Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Node REST API Reverse Proxy
    location /api/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_cache_bypass;
    }

    # Socket.io WebSocket Reverse Proxy
    location /socket.io/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_cache_bypass;
        proxy_read_timeout 86400;
    }
}
